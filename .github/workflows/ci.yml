name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (.NET 10)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet test --configuration Release --no-build --verbosity normal

  web:
    name: web (Next.js 16)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  agent:
    name: agent (Zig)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0
      - run: zig build -Dtarget=x86_64-windows-gnu -Doptimize=ReleaseSmall
      - run: zig build -Dtarget=aarch64-macos -Doptimize=ReleaseSmall
      - run: zig build -Dtarget=x86_64-macos -Doptimize=ReleaseSmall
      - uses: actions/upload-artifact@v4
        with:
          name: tawny-agent-builds
          path: agent/zig-out/
          retention-days: 7
